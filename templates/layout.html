<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-linen text-dark">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-10">
                <div class="card shadow-sm spring-card p-4 mb-4 border-0">
                    <div class="card-body">
                        <h1 class="display-6 mb-3">{% block nadpis %} {% endblock %}</h1>
                        {% block obsah %}
                        
                        {% endblock %}
                    </div>
                </div>
                {% block karty %}

                {% endblock %}
                
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.forEach(function (tooltipTriggerEl) {
                new bootstrap.Tooltip(tooltipTriggerEl);
            });

            var copyButtons = document.querySelectorAll('.copy-btn');
            copyButtons.forEach(function (copyButton) {
                copyButton.addEventListener('click', function () {
                    var value = copyButton.dataset.fullValue || '';
                    if (!value) {
                        return;
                    }
                    navigator.clipboard.writeText(value).then(function () {
                        var original = copyButton.innerHTML;
                        copyButton.innerHTML = '✓';
                        setTimeout(function () {
                            copyButton.innerHTML = original;
                        }, 1200);
                    });
                });
            });
        });
    </script>
</body>
</html>
